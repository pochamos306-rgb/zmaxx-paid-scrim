<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commission</title>
</head>

<body style="background:#111;color:white;font-family:Arial;text-align:center;padding:20px;">

<h1>💰 Employee Commission</h1>

<h3>Employee Commission List</h3>

<div id="commissionList"></div>

<button onclick="location.href='dashboard.html'"
style="padding:12px 25px;background:blue;color:white;border:none;border-radius:8px;">
⬅ Back to Dashboard
</button>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEL_6w7HB43up4n4efgZo43zSHIMpVSTo",
  authDomain: "z-maxx-paid-scrim.firebaseapp.com",
  databaseURL: "https://z-maxx-paid-scrim-default-rtdb.firebaseio.com",
  projectId: "z-maxx-paid-scrim",
  storageBucket: "z-maxx-paid-scrim.firebasestorage.app",
  messagingSenderId: "283601239964",
  appId: "1:283601239964:web:0811f805c817fa84209259"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list = document.getElementById("commissionList");

onValue(ref(db,"bookings"),(snapshot)=>{

let employees = {};

snapshot.forEach((item) => {

    let booking = item.val();

    if (!employees[booking.employee]) {
    employees[booking.employee] = {
        bookings: 0,
        amount: 0
    };
}

employees[booking.employee].bookings++;
employees[booking.employee].amount += Number(booking.entryFee || 0);

});

let html = "";

for (let name in employees) {
    html += `
    <div style="background:#222;padding:15px;margin:10px;border-radius:8px;">
        <h3>${name}</h3>
        <p>Total Bookings: ${employees[name]}</p>
    </div>
    `;
}

list.innerHTML = html;

});

</script>
</body>
</html>
