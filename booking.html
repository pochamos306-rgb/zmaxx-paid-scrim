<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Panel</title>
</head>

<body>

<h2>Z-MAXX PAID SCRIM - Booking Panel</h2>

<p><b>Employee:</b> <span id="employeeName">Loading...</span></p>

<input type="text" id="teamName" placeholder="Team Name"><br><br>

<label>Booking Date</label><br>
<input type="date" id="bookingDate"><br><br>

<label>Slot Time</label><br>
<input type="time" id="slotTime"><br><br>

<input type="number" id="entryFee" placeholder="Entry Fee"><br><br>

<label>Status</label><br>
<select id="status">
  <option>Paid</option>
  <option>Pending</option>
</select><br><br>

<label>Payment Method</label><br>
<select id="paymentMethod">
  <option>UPI</option>
  <option>Cash</option>
  <option>Bank Transfer</option>
</select><br><br>

<input type="text" id="utr" placeholder="UTR / Transaction ID"><br><br>

<button id="saveBooking">Save Booking</button>
</body>
</html>
