<!DOCTYPE html>
<html>
<head>
<title>New Booking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}
input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
}
button{
width:100%;
padding:15px;
background:red;
color:white;
border:none;
border-radius:8px;
font-size:18px;
}
</style>
</head>

<body>

<h2>🎮 New Booking</h2>

<input type="text" placeholder="Customer Name">

<input type="text" placeholder="Team Name">

<input type="text" placeholder="Slot Number">

<input type="date">

<input type="time">

<input type="number" placeholder="Entry Fee">

<select>
<option>Payment Method</option>
<option>UPI</option>
<option>Cash</option>
</select>

<input type="text" placeholder="UTR ID">

<select>
<option>PAID</option>
<option>PENDING</option>
</select>

<button>Save Booking</button>

</body>
</html>
