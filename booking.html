<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Panel</title>
</head>

<body>

<h2>Z-MAXX PAID SCRIM - Booking Panel</h2>

<p><b>Employee:</b> <span id="employeeName">Loading...</span></p>

<input type="text" id="teamName" placeholder="Team Name"><br><br>

<label>Booking Date</label><br>
<input type="date" id="bookingDate"><br><br>

<label>Slot Time</label><br>
<input type="time" id="slotTime"><br><br>

<input type="number" id="entryFee" placeholder="Entry Fee"><br><br>

<label>Status</label><br>
<select id="status">
  <option>Paid</option>
  <option>Pending</option>
</select><br><br>

<label>Payment Method</label><br>
<select id="paymentMethod">
  <option>UPI</option>
  <option>Cash</option>
  <option>Bank Transfer</option>
</select><br><br>

<input type="text" id="utr" placeholder="UTR / Transaction ID"><br><br>

<button id="saveBooking">Save Booking</button>
 <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { getDatabase } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
import { ref, set, push } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
const firebaseConfig = {
  apiKey: "AIzaSyCEL_6w7HB43up4n4efgZo43zSHIMpVSTo",
  authDomain: "z-maxx-paid-scrim.firebaseapp.com",
  databaseURL: "https://z-maxx-paid-scrim-default-rtdb.firebaseio.com",
  projectId: "z-maxx-paid-scrim",
  storageBucket: "z-maxx-paid-scrim.firebasestorage.app",
  messagingSenderId: "283601239964",
  appId: "1:283601239964:web:0811f805c817fa84209259"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

console.log("Firebase Connected");
const employee = localStorage.getItem("employeeName");

if (employee) {
    document.getElementById("employeeName").innerText = employee;
} else {
    document.getElementById("employeeName").innerText = "Not Logged In";
}
document.getElementById("saveBooking").onclick = function () {

const booking = {
  employee: document.getElementById("employeeName").innerText,
  teamName: document.getElementById("teamName").value,
  bookingDate: document.getElementById("bookingDate").value,
  slotTime: document.getElementById("slotTime").value,
  entryFee: document.getElementById("entryFee").value,
  status: document.getElementById("status").value,
  paymentMethod: document.getElementById("paymentMethod").value,
  utr: document.getElementById("utr").value,
  createdAt: new Date().toISOString()
};

set(push(ref(db, "bookings")), booking)
.then(() => {
    alert("Booking Saved Successfully");
})
.catch((error) => {
    alert(error.message);
});

};
 </script> 
</body>
</html>
