<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#111;color:white;font-family:Arial;text-align:center;padding-top:80px;">

<h1>🔐 Admin Login</h1>

<input id="email" type="email" placeholder="Email"
style="padding:12px;width:250px;margin:10px;"><br>

<input id="password" type="password" placeholder="Password"
style="padding:12px;width:250px;margin:10px;"><br>

<button onclick="login()"
style="padding:12px 30px;background:red;color:white;border:none;border-radius:10px;">
Login
</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEL_6w7HB43up4n4efgZo43zSHIMpVSTo",
  authDomain: "z-maxx-paid-scrim.firebaseapp.com",
  projectId: "z-maxx-paid-scrim",
  storageBucket: "z-maxx-paid-scrim.firebasestorage.app",
  messagingSenderId: "283601239964",
  appId: "1:283601239964:web:0811f805c817fa84209259"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {

    alert("Login Successful");

    localStorage.setItem("employeeName", email);

    if (email === "admin@zmaxx.com") {
        window.location.href = "dashboard.html";
    } else {
        window.location.href = "booking.html";
    }

})
    .catch((error) => {
      alert(error.message);
    });
};
</script>

</body>
</html>
