<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employees</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}
input{
width:90%;
padding:12px;
margin:10px;
border-radius:8px;
border:none;
}
button{
padding:12px 25px;
margin:10px;
background:green;
color:white;
border:none;
border-radius:8px;
}
#list{
margin-top:20px;
}
.employee{
background:#222;
padding:10px;
margin:10px;
border-radius:8px;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
push,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCEL_6w7HB43up4n4efgZo43zSHIMpVSTo",
authDomain: "z-maxx-paid-scrim.firebaseapp.com",
databaseURL: "https://z-maxx-paid-scrim-default-rtdb.firebaseio.com",
projectId: "z-maxx-paid-scrim",
storageBucket: "z-maxx-paid-scrim.firebasestorage.app",
messagingSenderId: "283601239964",
appId: "1:283601239964:web:0811f805c817fa84209259"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveEmployee = function(){

let name=document.getElementById("name").value;
let pass=document.getElementById("pass").value;

push(ref(db,"employees"),{
name:name,
password:pass
});

alert("Employee Saved");

document.getElementById("name").value="";
document.getElementById("pass").value="";
}

onValue(ref(db,"employees"),snapshot=>{

let html="";

snapshot.forEach(data=>{

let emp=data.val();

html+=`
<div class="employee">
<b>${emp.name}</b><br>
${emp.password}
</div>
`;

});

document.getElementById("list").innerHTML=html;

});
</script>

</head>

<body>

<h2>👨 Employees</h2>

<input id="name" placeholder="Employee Name">

<input id="pass" placeholder="Password">

<button onclick="saveEmployee()">Save Employee</button>

<div id="list"></div>

</body>
</html>
