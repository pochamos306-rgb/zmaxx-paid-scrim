<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#111;color:white;font-family:Arial;text-align:center;padding:30px;">

<h1>🎮 Admin Dashboard</h1>

<h3>Welcome Admin!</h3>
<h2>Total Bookings: <span id="totalBookings">0</span></h2>
<br>

<button onclick="location.href='bookings.html'"
style="padding:15px 25px;margin:10px;background:purple;color:white;border:none;border-radius:10px;">
View Bookings
</button>
<button onclick="location.href='employees.html'" style="padding:15px 25px;margin:10px;background:green;color:white;border:none;border-radius:10px;">
Employees
</button>



<button onclick="location.href='commission.html'" style="padding:15px 25px;margin:10px;background:orange;color:white;border:none;border-radius:10px;">
Commission
</button>
<script type="module" src="firebase.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEL_6w7HB43up4n4efgZo43zSHIMpVSTo",
  authDomain: "z-maxx-paid-scrim.firebaseapp.com",
  databaseURL: "https://z-maxx-paid-scrim-default-rtdb.firebaseio.com",
  projectId: "z-maxx-paid-scrim",
  storageBucket: "z-maxx-paid-scrim.firebasestorage.app",
  messagingSenderId: "283601239964",
  appId: "1:283601239964:web:0811f805c817fa84209259"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
onValue(ref(db, "bookings"), (snapshot) => {

    let total = 0;

    if (snapshot.exists()) {
        snapshot.forEach(() => {
            total++;
        });
    }

    document.getElementById("totalBookings").innerText = total;

});
</script>
</body>
</html>
